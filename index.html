<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.container {
    display:flex;
    min-height:100vh;
}

.left {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#6366f1,#06b6d4);
}

.right {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:40px;
}

input, select {
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    width:100%;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#6366f1;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover {
    background:#4f46e5;
}

.hidden { display:none; }

.dashboard {
    display:flex;
}

.sidebar {
    width:200px;
    background:#020617;
    min-height:100vh;
    padding:20px;
}

.sidebar button {
    width:100%;
    margin:10px 0;
}

.main {
    flex:1;
    padding:20px;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin:10px 0;
    width:200px;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td, th {
    border:1px solid #444;
    padding:8px;
    text-align:center;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
    <div class="left">
        <h1>Welcome Back</h1>
    </div>
    <div class="right">
        <h2>Login</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden dashboard">

    <div class="sidebar">
        <h3>Menu</h3>
        <button onclick="showPage()">Students</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="main">
        <h2>Dashboard</h2>
        <div class="card">Students: <span id="count">0</span></div>

        <div id="studentsPage">
            <h3>Add Student</h3>
            <input id="name" placeholder="Name">
            <select id="section">
                <option>3rd Prep</option>
                <option>Sec 1</option>
                <option>Sec 2</option>
                <option>Sec 3</option>
            </select>
            <input id="sphone" placeholder="Student Phone">
            <input id="pphone" placeholder="Parent Phone">
            <select id="homework">
                <option>Done</option>
                <option>Not Done</option>
            </select>
            <select id="attendance">
                <option>Present</option>
                <option>Absent</option>
            </select>
            <input id="quiz" placeholder="Quiz Degree">
            <button onclick="addStudent()">Save</button>
            <button onclick="download()">Download Excel</button>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Section</th>
                        <th>Phones</th>
                        <th>HW</th>
                        <th>Attend</th>
                        <th>Quiz</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// Supabase connection
const supabaseUrl = "https://uhshlpukhgreezddochz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoc2hscHVraGdyZWV6ZGRvY2h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzI3MjYsImV4cCI6MjA5MDEwODcyNn0.JPY4_PBPsU-VdyJXgL2FgomTVbFjln3rz_wUnfRdCjA";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

// LOGIN
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;
    if(u === "admin" && p === "654321"){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        load();
    } else {
        alert("Wrong login");
    }
}

// LOGOUT
function logout(){
    location.reload();
}

// SHOW PAGE
function showPage(){
    document.getElementById("studentsPage").style.display = "block";
}

// LOAD STUDENTS
async function load(){
    let { data } = await supabase.from("students").select("*").order('id', { ascending: true });
    let t = document.getElementById("table");
    t.innerHTML = "";
    data.forEach(s=>{
        let row = t.insertRow();
        row.innerHTML = `
        <td>${s.name}</td>
        <td>${s.section}</td>
        <td>${s.sphone}<br>${s.pphone}</td>
        <td>${s.homework}</td>
        <td>${s.attendance}</td>
        <td>${s.quiz}</td>
        <td><button onclick="del(${s.id})">Delete</button></td>
        `;
    });
    document.getElementById("count").innerText = data.length;
}

// ADD STUDENT
async function addStudent(){
    await supabase.from("students").insert([{
        name: document.getElementById("name").value,
        section: document.getElementById("section").value,
        sphone: document.getElementById("sphone").value,
        pphone: document.getElementById("pphone").value,
        homework: document.getElementById("homework").value,
        attendance: document.getElementById("attendance").value,
        quiz: document.getElementById("quiz").value
    }]);
    // clear inputs
    document.getElementById("name").value="";
    document.getElementById("sphone").value="";
    document.getElementById("pphone").value="";
    document.getElementById("quiz").value="";
    load();
}

// DELETE STUDENT
async function del(id){
    await supabase.from("students").delete().eq("id", id);
    load();
}

// DOWNLOAD CSV
async function download(){
    let { data } = await supabase.from("students").select("*");
    let csv = "Name,Section,Student Phone,Parent Phone,Homework,Attendance,Quiz\n";
    data.forEach(s=>{
        csv += `${s.name},${s.section},${s.sphone},${s.pphone},${s.homework},${s.attendance},${s.quiz}\n`;
    });
    let blob = new Blob([csv], { type: "text/csv" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "students.csv";
    a.click();
}
</script>
</body>
</html>
