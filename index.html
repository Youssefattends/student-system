<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN PAGE */
.container {
    display:flex;
    height:100vh;
}

.left {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#6366f1,#06b6d4);
}

.right {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:40px;
}

input, select {
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    width:100%;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#6366f1;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

.hidden { display:none; }

/* DASHBOARD */
.dashboard {
    display:flex;
}

.sidebar {
    width:200px;
    background:#020617;
    height:100vh;
    padding:20px;
}

.sidebar button {
    width:100%;
    margin:10px 0;
}

.main {
    flex:1;
    padding:20px;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin:10px;
    display:inline-block;
    width:200px;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td, th {
    border:1px solid #444;
    padding:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
    <div class="left">
        <h1>Welcome Back</h1>
    </div>

    <div class="right">
        <h2>Login</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden dashboard">

    <div class="sidebar">
        <h3>Menu</h3>
        <button onclick="showPage('students')">Students</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="main">

        <h2>Dashboard</h2>

        <div class="card">Students: <span id="count">0</span></div>

        <!-- STUDENTS PAGE -->
        <div id="studentsPage">

            <h3>Add Student</h3>

            <input id="name" placeholder="Name">
            
            <select id="section">
                <option>3rd Prep</option>
                <option>Sec 1</option>
                <option>Sec 2</option>
                <option>Sec 3</option>
            </select>

            <input id="sphone" placeholder="Student Phone">
            <input id="pphone" placeholder="Parent Phone">

            <select id="homework">
                <option>Done</option>
                <option>Not Done</option>
            </select>

            <select id="attendance">
                <option>Present</option>
                <option>Absent</option>
            </select>

            <input id="quiz" placeholder="Quiz Degree">

            <button onclick="addStudent()">Save</button>
            <button onclick="download()">Download Excel</button>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Section</th>
                        <th>Phones</th>
                        <th>HW</th>
                        <th>Attend</th>
                        <th>Quiz</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>

        </div>

    </div>
</div>

<script>

// ADMIN LOGIN
const adminUser = "admin";
const adminPass = "654321";

// DATA
let students = JSON.parse(localStorage.getItem("students")) || [];

// LOGIN
function login(){
    let u = user.value;
    let p = pass.value;

    if(u === adminUser && p === adminPass){
        loginPage.classList.add("hidden");
        dashboard.classList.remove("hidden");
        load();
    } else {
        alert("Wrong login");
    }
}

// LOGOUT
function logout(){
    location.reload();
}

// ADD STUDENT
function addStudent(){
    let s = {
        name:name.value,
        section:section.value,
        sphone:sphone.value,
        pphone:pphone.value,
        homework:homework.value,
        attendance:attendance.value,
        quiz:quiz.value
    };

    students.push(s);
    localStorage.setItem("students", JSON.stringify(students));
    load();
}

// LOAD TABLE
function load(){
    let t = document.getElementById("table");
    t.innerHTML = "";

    students.forEach((s,i)=>{
        let row = t.insertRow();
        row.innerHTML = `
        <td>${s.name}</td>
        <td>${s.section}</td>
        <td>${s.sphone}<br>${s.pphone}</td>
        <td>${s.homework}</td>
        <td>${s.attendance}</td>
        <td>${s.quiz}</td>
        <td><button onclick="del(${i})">Delete</button></td>
        `;
    });

    document.getElementById("count").innerText = students.length;
}

// DELETE
function del(i){
    students.splice(i,1);
    localStorage.setItem("students", JSON.stringify(students));
    load();
}

// DOWNLOAD CSV
function download(){
    let csv = "Name,Section,Student Phone,Parent Phone,Homework,Attendance,Quiz\n";

    students.forEach(s=>{
        csv += `${s.name},${s.section},${s.sphone},${s.pphone},${s.homework},${s.attendance},${s.quiz}\n`;
    });

    let blob = new Blob([csv]);
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "students.csv";
    a.click();
}

</script>

</body>
</html>
