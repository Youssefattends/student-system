<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            margin: 0;
            padding: 0;
        }

        .card {
            background: white;
            width: 95%;
            max-width: 1100px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        input, select {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 180px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .primary { background: #4e73df; color: white; }
        .success { background: #1cc88a; color: white; }
        .danger { background: #e74a3b; color: white; }
        .whatsapp { background: #25D366; color: white; }

        button:hover { opacity: 0.85; }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #f8f9fc;
        }

        .hidden { display: none; }

        @media(max-width: 768px){
            input, select {
                width: 100%;
                display: block;
            }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginPage" class="card">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <br><br>
    <button class="primary" onclick="login()">Login</button>
</div>

<!-- Main -->
<div id="mainPage" class="card hidden">
    <h2>Student Attendance & Quiz System</h2>

    <input type="text" id="name" placeholder="Student Name">

    <select id="section">
        <option value="">Select Section</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <input type="tel" id="studentPhone" placeholder="Student Phone">
    <input type="tel" id="parentPhone" placeholder="Parent Phone">

    <select id="homework">
        <option value="">Homework</option>
        <option>Done</option>
        <option>Not Done</option>
    </select>

    <select id="attendance">
        <option value="">Attendance</option>
        <option>Present</option>
        <option>Absent</option>
    </select>

    <input type="number" id="quiz" placeholder="Quiz Degree">

    <br><br>
    <button class="primary" onclick="saveStudent()">Save</button>
    <button class="success" onclick="downloadExcel()">Download Excel</button>
    <button class="danger" onclick="logout()">Logout</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Section</th>
                <th>Student Phone</th>
                <th>Parent Phone</th>
                <th>Homework</th>
                <th>Attendance</th>
                <th>Quiz</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

const adminUser = "admin";
const adminPass = "654321";

function login() {
    let u = username.value;
    let p = password.value;
    if(u === adminUser && p === adminPass){
        loginPage.classList.add("hidden");
        mainPage.classList.remove("hidden");
        loadTable();
    } else { alert("Wrong login"); }
}

function logout() {
    location.reload();
}

function saveStudent() {
    let student = {
        name: name.value,
        section: section.value,
        studentPhone: studentPhone.value,
        parentPhone: parentPhone.value,
        homework: homework.value,
        attendance: attendance.value,
        quiz: quiz.value
    };

    if(Object.values(student).some(v => !v)){
        alert("Fill all fields");
        return;
    }

    if(editIndex === -1) students.push(student);
    else { students[editIndex] = student; editIndex = -1; }

    localStorage.setItem("students", JSON.stringify(students));
    clearFields();
    loadTable();
}

function loadTable() {
    dataTable.innerHTML = "";
    students.forEach((s, i)=>{
        let row = dataTable.insertRow();
        row.innerHTML = `
            <td>${s.name}</td>
            <td>${s.section}</td>
            <td>${s.studentPhone}</td>
            <td>${s.parentPhone}</td>
            <td>${s.homework}</td>
            <td>${s.attendance}</td>
            <td>${s.quiz}</td>
            <td>
                <button class="whatsapp" onclick="sendWhatsApp('${s.parentPhone}')">WhatsApp</button>
                <button class="primary" onclick="editStudent(${i})">Edit</button>
                <button class="danger" onclick="deleteStudent(${i})">Delete</button>
            </td>
        `;
    });
}

function sendWhatsApp(phone) {
    let cleanPhone = phone.replace(/\D/g, '');
    let url = `https://wa.me/${cleanPhone}?text=Hi`;
    window.open(url, "_blank");
}

function editStudent(i) {
    let s = students[i];
    name.value = s.name;
    section.value = s.section;
    studentPhone.value = s.studentPhone;
    parentPhone.value = s.parentPhone;
    homework.value = s.homework;
    attendance.value = s.attendance;
    quiz.value = s.quiz;
    editIndex = i;
}

function deleteStudent(i) {
    students.splice(i,1);
    localStorage.setItem("students", JSON.stringify(students));
    loadTable();
}

function clearFields() {
    name.value="";
    section.value="";
    studentPhone.value="";
    parentPhone.value="";
    homework.value="";
    attendance.value="";
    quiz.value="";
}

function downloadExcel() {
    let csv = "Name,Section,Student Phone,Parent Phone,Homework,Attendance,Quiz\n";
    students.forEach(s=>{
        csv += `${s.name},${s.section},${s.studentPhone},${s.parentPhone},${s.homework},${s.attendance},${s.quiz}\n`;
    });

    let blob = new Blob([csv], { type:"text/csv" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "students.csv";
    link.click();
}
</script>

</body>
</html>
