<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background: linear-gradient(135deg,#4e73df,#1cc88a); }
.card { background:#fff; padding:20px; margin:20px auto; max-width:1000px; border-radius:10px;}
input,select { margin:5px; padding:8px; width:180px;}
button { padding:8px 12px; margin:5px; cursor:pointer;}
.hidden { display:none; }
</style>
</head>

<body>

<!-- ✅ Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  "https://uhshlpukhgreezddochz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);
</script>

<!-- LOGIN -->
<div id="loginPage" class="card">
<h2>Login</h2>
<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">
<br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainPage" class="card hidden">
<h2>طلاب</h2>

<input id="code" placeholder="Code">
<input id="name" placeholder="Name">
<select id="section">
<option value="">Section</option>
<option>3rd Prep</option>
<option>Sec 1</option>
</select>

<input id="studentphone" placeholder="Student Phone">
<input id="parentphone" placeholder="Parent Phone">

<select id="homework">
<option value="">Homework</option>
<option>Done</option>
<option>Not Done</option>
</select>

<select id="attendance">
<option value="">Attendance</option>
<option>Present</option>
<option>Absent</option>
</select>

<input id="quiz" type="number" placeholder="Quiz">

<br>
<button onclick="saveStudent()">Save</button>
<button onclick="logout()">Logout</button>

<table border="1" width="100%">
<thead>
<tr>
<th>Code</th><th>Name</th><th>Section</th><th>Actions</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>

</div>

<script>
const admins = [
  {user:"sayed", pass:"sayed"},
  {user:"omar", pass:"omar"}
];

let editId=null;

// ✅ LOGIN FIXED
function login(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const ok = admins.find(a=>a.user===username && a.pass===password);

  if(ok){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("mainPage").classList.remove("hidden");
    loadTable();
  }else{
    alert("Wrong login");
  }
}

function logout(){
  location.reload();
}

// ✅ SAVE
async function saveStudent(){
  const code = document.getElementById("code").value;
  const name = document.getElementById("name").value;
  const section = document.getElementById("section").value;

  if(!code || !name || !section){
    alert("fill data");
    return;
  }

  if(editId){
    await supabase.from("students")
    .update({code,name,section})
    .eq("id",editId);

    editId=null;
  }else{
    await supabase.from("students")
    .insert([{code,name,section}]);
  }

  loadTable();
}

// ✅ LOAD
async function loadTable(){
  const {data} = await supabase.from("students").select("*");

  const table = document.getElementById("dataTable");
  table.innerHTML="";

  data.forEach(s=>{
    table.innerHTML+=`
    <tr>
      <td>${s.code}</td>
      <td>${s.name}</td>
      <td>${s.section}</td>
      <td>
        <button onclick="edit('${s.id}')">Edit</button>
        <button onclick="del('${s.id}')">Delete</button>
      </td>
    </tr>`;
  });
}

// DELETE
async function del(id){
  await supabase.from("students").delete().eq("id",id);
  loadTable();
}

// EDIT
async function edit(id){
  const {data} = await supabase.from("students")
  .select("*").eq("id",id).single();

  editId=id;

  document.getElementById("code").value=data.code;
  document.getElementById("name").value=data.name;
  document.getElementById("section").value=data.section;
}
</script>

</body>
</html>
