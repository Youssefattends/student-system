<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: linear-gradient(135deg,#4e73df,#1cc88a); margin:0; }
        .card { background:white; width:95%; max-width:1200px; margin:30px auto; padding:20px; border-radius:10px; }
        input, select { padding:8px; margin:5px; width:180px; }
        button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }
        .primary{background:#4e73df;color:white;}
        .success{background:#1cc88a;color:white;}
        .danger{background:#e74a3b;color:white;}
        .whatsapp{background:#25D366;color:white;}
        .hidden{display:none;}
        table{width:100%;margin-top:20px;border-collapse:collapse;}
        th,td{border:1px solid #ddd;padding:8px;text-align:center;}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="card">
    <h2>Admin Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <br><br>
    <button class="primary" onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainPage" class="card hidden">
    <h2>Student System</h2>

    <input id="code" placeholder="Code">
    <input id="name" placeholder="Name">

    <select id="section">
        <option value="">Section</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <input id="studentPhone" placeholder="Student Phone">
    <input id="parentPhone" placeholder="Parent Phone">

    <select id="homework">
        <option value="">Homework</option>
        <option>Done</option>
        <option>Not Done</option>
    </select>

    <select id="attendance">
        <option value="">Attendance</option>
        <option>Present</option>
        <option>Absent</option>
    </select>

    <input id="quiz" type="number" placeholder="Quiz">

    <br><br>
    <button class="primary" onclick="saveStudent()">Save</button>
    <button class="danger" onclick="logout()">Logout</button>

    <br><br>
    <select id="filterSection" onchange="loadTable()">
        <option value="All">All</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>Code</th><th>Name</th><th>Section</th>
                <th>Student Phone</th><th>Parent Phone</th>
                <th>Homework</th><th>Attendance</th><th>Quiz</th><th>Actions</th>
            </tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const client = window.supabase.createClient(
    "https://uhshlpukhgreezddochz.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoc2hscHVraGdyZWV6ZGRvY2h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzI3MjYsImV4cCI6MjA5MDEwODcyNn0.JPY4_PBPsU-VdyJXgL2FgomTVbFjln3rz_wUnfRdCjA"
);

// LOGIN
const admins = [
  {user:"sayed",pass:"sayed"},
  {user:"omar",pass:"omar"}
];

function login(){
    let u=document.getElementById("username").value;
    let p=document.getElementById("password").value;
    let ok=admins.find(a=>a.user===u && a.pass===p);
    if(ok){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");
        loadTable();
    } else alert("Wrong login");
}

function logout(){ location.reload(); }

// SAVE
async function saveStudent(){
    let code=document.getElementById("code").value.trim();
    let name=document.getElementById("name").value.trim();
    let section=document.getElementById("section").value;
    let studentPhone=document.getElementById("studentPhone").value.trim();
    let parentPhone=document.getElementById("parentPhone").value.trim();
    let homework=document.getElementById("homework").value;
    let attendance=document.getElementById("attendance").value;
    let quiz=document.getElementById("quiz").value;

    if(!code||!name||!section||!studentPhone||!parentPhone||!homework||!attendance||quiz===""){
        alert("Fill all fields"); return;
    }

    if(!parentPhone.startsWith("02")) parentPhone="02"+parentPhone;

    let { error } = await client.from("students").insert([{
        code,name,section,
        studentphone:studentPhone,
        parentphone:parentPhone,
        homework,attendance,quiz
    }]);

    if(error){ alert(error.message); return; }

    clearFields();
    loadTable();
    alert("Saved ✅");
}

// LOAD TABLE
async function loadTable(){
    let filter=document.getElementById("filterSection").value;
    let { data } = await client.from("students").select("*");

    let table=document.getElementById("dataTable");
    table.innerHTML="";

    data.forEach(s=>{
        if(filter!=="All" && s.section!==filter) return;

        let row=table.insertRow();
        row.innerHTML=`
        <td>${s.code}</td>
        <td>${s.name}</td>
        <td>${s.section}</td>
        <td>${s.studentphone}</td>
        <td>${s.parentphone}</td>
        <td>${s.homework}</td>
        <td>${s.attendance}</td>
        <td>${s.quiz}</td>
        <td>
        <button class="whatsapp" onclick="sendWhatsApp('${s.parentphone}','${s.code}','${s.name}','${s.attendance}','${s.homework}','${s.quiz}')">WhatsApp</button>
        <button onclick="deleteStudent(${s.id})" class="danger">Delete</button>
        </td>`;
    });
}

// DELETE
async function deleteStudent(id){
    await client.from("students").delete().eq("id",id);
    loadTable();
}

// CLEAR
function clearFields(){
    document.querySelectorAll("input,select").forEach(e=>e.value="");
}

// WHATSAPP BUTTON FUNCTION
function sendWhatsApp(parentPhone, code, name, attendance, homework, quiz){
    if(!parentPhone){ alert("Parent number missing"); return; }
    let phone = parentPhone.replace(/\D/g,''); // remove non-digit chars
    if(phone.length===10 && phone.startsWith("0")) phone="20"+phone.substring(1);
    else if(phone.length===9) phone="20"+phone;
    if(phone.length<11){ alert("Invalid phone number"); return; }

    let message = `Code: ${code}\nName: ${name}\nAttendance: ${attendance}\nHomework: ${homework}\nQuiz: ${quiz}`;
    let url = "https://wa.me/"+phone+"?text="+encodeURIComponent(message);
    window.open(url,"_blank");
}
</script>

</body>
</html>
