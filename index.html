<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            margin: 0;
            padding: 0;
        }

        .card {
            background: white;
            width: 95%;
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 180px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .primary { background:#4e73df; color:white; }
        .success { background:#1cc88a; color:white; }
        .danger { background:#e74a3b; color:white; }
        .whatsapp { background:#25D366; color:white; }

        button:hover { opacity:0.85; }

        table {
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th, td {
            padding:8px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        th { background:#f2f2f2; }

        .hidden { display:none; }

        @media(max-width:768px){
            input, select { width:100%; display:block; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="card">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <br><br>
    <button class="primary" onclick="login()">Login</button>
</div>

<!-- MAIN PAGE -->
<div id="mainPage" class="card hidden">
    <h2>Student Attendance & Quiz System</h2>

    <input type="text" id="name" placeholder="Student Name">

    <select id="section">
        <option value="">Select Section</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <input type="tel" id="studentPhone" placeholder="Student Phone">
    <input type="tel" id="parentPhone" placeholder="Parent Phone">

    <select id="homework">
        <option value="">Homework</option>
        <option>Done</option>
        <option>Not Done</option>
    </select>

    <select id="attendance">
        <option value="">Attendance</option>
        <option>Present</option>
        <option>Absent</option>
    </select>

    <input type="number" id="quiz" placeholder="Quiz Degree">

    <br><br>
    <button class="primary" onclick="saveStudent()">Save Student</button>
    <button class="success" onclick="downloadExcel()">Download Excel</button>
    <button class="danger" onclick="logout()">Logout</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Section</th>
                <th>Student Phone</th>
                <th>Parent Phone</th>
                <th>Homework</th>
                <th>Attendance</th>
                <th>Quiz</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

const adminUser = "admin";
const adminPass = "654321";

function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === adminUser && pass === adminPass){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");
        loadTable();
    } else {
        alert("Wrong login");
    }
}

function logout() {
    location.reload();
}

function saveStudent() {

    let name = document.getElementById("name").value.trim();
    let section = document.getElementById("section").value;
    let studentPhone = document.getElementById("studentPhone").value.trim();
    let parentPhone = document.getElementById("parentPhone").value.trim();
    let homework = document.getElementById("homework").value;
    let attendance = document.getElementById("attendance").value;
    let quiz = document.getElementById("quiz").value;

    if(name === "" || section === "" || studentPhone === "" ||
       parentPhone === "" || homework === "" ||
       attendance === "" || quiz === "") {
        alert("Fill all fields");
        return;
    }

    let student = { name, section, studentPhone, parentPhone, homework, attendance, quiz };

    if(editIndex === -1){
        students.push(student);
    } else {
        students[editIndex] = student;
        editIndex = -1;
    }

    localStorage.setItem("students", JSON.stringify(students));
    clearFields();
    loadTable();
}

function loadTable() {
    let table = document.getElementById("dataTable");
    table.innerHTML = "";

    students.forEach((s, i)=>{
        let row = table.insertRow();
        row.innerHTML = `
            <td>${s.name}</td>
            <td>${s.section}</td>
            <td>${s.studentPhone}</td>
            <td>${s.parentPhone}</td>
            <td>${s.homework}</td>
            <td>${s.attendance}</td>
            <td>${s.quiz}</td>
            <td>
                <button class="whatsapp" onclick="sendWhatsApp('${s.parentPhone}', '${s.name}')">WhatsApp</button>
                <button class="primary" onclick="editStudent(${i})">Edit</button>
                <button class="danger" onclick="deleteStudent(${i})">Delete</button>
            </td>
        `;
    });
}

function sendWhatsApp(phone, studentName) {
    if (!phone) {
        alert("Phone number is empty!");
        return;
    }

    // Remove all non-digit characters
    let cleanPhone = phone.replace(/\D/g,'');

    // Fix Egyptian numbers
    // If 10 digits starting with 0, replace leading 0 with 20
    if (cleanPhone.length === 10 && cleanPhone.startsWith("0")) {
        cleanPhone = "20" + cleanPhone.substring(1);
    } 
    // If 9 digits, add 20 (assume missing leading 0)
    else if (cleanPhone.length === 9) {
        cleanPhone = "20" + cleanPhone;
    }

    // Validate final number length
    if (cleanPhone.length < 11) {
        alert("Invalid phone number. Include full Egyptian number (e.g., 01012345678).");
        return;
    }

    // Message with student name
    let message = `Hello, this is a message regarding ${studentName}.`;
    let url = "https://wa.me/" + cleanPhone + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}

function editStudent(i) {
    let s = students[i];
    document.getElementById("name").value = s.name;
    document.getElementById("section").value = s.section;
    document.getElementById("studentPhone").value = s.studentPhone;
    document.getElementById("parentPhone").value = s.parentPhone;
    document.getElementById("homework").value = s.homework;
    document.getElementById("attendance").value = s.attendance;
    document.getElementById("quiz").value = s.quiz;
    editIndex = i;
}

function deleteStudent(i) {
    students.splice(i,1);
    localStorage.setItem("students", JSON.stringify(students));
    loadTable();
}

function clearFields() {
    document.getElementById("name").value="";
    document.getElementById("section").value="";
    document.getElementById("studentPhone").value="";
    document.getElementById("parentPhone").value="";
    document.getElementById("homework").value="";
    document.getElementById("attendance").value="";
    document.getElementById("quiz").value="";
}

function downloadExcel() {
    let csv = "Name,Section,Student Phone,Parent Phone,Homework,Attendance,Quiz\n";

    students.forEach(function(s){
        csv += s.name + "," + s.section + "," + s.studentPhone + "," +
               s.parentPhone + "," + s.homework + "," +
               s.attendance + "," + s.quiz + "\n";
    });

    let blob = new Blob([csv], { type:"text/csv" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "students.csv";
    link.click();
}
</script>

</body>
</html>
