<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard with Supabase</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background: linear-gradient(135deg,#4e73df,#1cc88a); margin:0; padding:0; }
.card { background:white; width:95%; max-width:1200px; margin:30px auto; padding:20px; border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,0.2);}
input, select { padding:8px; margin:5px; border-radius:5px; border:1px solid #ccc; width:180px;}
button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;}
.primary { background:#4e73df; color:white; } 
.success { background:#1cc88a; color:white; }
.danger { background:#e74a3b; color:white; }
.whatsapp { background:#25D366; color:white; }
button:hover { opacity:0.85; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
th, td { padding:8px; border-bottom:1px solid #ddd; text-align:center;}
th { background:#f2f2f2; }
.hidden { display:none; }
@media(max-width:768px){ input, select { width:100%; display:block; } }
</style>
</head>
<body>

<div id="loginPage" class="card">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <br><br>
    <button class="primary" id="loginBtn">Login</button>
</div>

<div id="mainPage" class="card hidden">
    <h2>Student Attendance & Quiz System</h2>
    <input type="text" id="code" placeholder="Code">
    <input type="text" id="name" placeholder="Student Name">
    <select id="section">
        <option value="">Select Section</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>
    <input type="tel" id="studentphone" placeholder="Student Phone">
    <input type="tel" id="parentphone" placeholder="Parent Phone">
    <select id="homework">
        <option value="">Homework</option>
        <option>Done</option>
        <option>Not Done</option>
    </select>
    <select id="attendance">
        <option value="">Attendance</option>
        <option>Present</option>
        <option>Absent</option>
    </select>
    <input type="number" id="quiz" placeholder="Quiz Degree">
    <br><br>
    <button class="primary" id="saveBtn">Save Student</button>
    <button class="success" id="downloadBtn">Download Excel</button>
    <button class="danger" id="logoutBtn">Logout</button>

    <br><br>
    <label for="filterSection">Filter by Section:</label>
    <select id="filterSection">
        <option value="All">All Students</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Section</th>
                <th>Student Phone</th>
                <th>Parent Phone</th>
                <th>Homework</th>
                <th>Attendance</th>
                <th>Quiz</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase setup
const SUPA_URL = "<YOUR_SUPABASE_URL>";
const SUPA_KEY = "<YOUR_SUPABASE_ANON_KEY>";
const supabase = supabase.createClient(SUPA_URL, SUPA_KEY);

// Admins
const admins = [{user:"sayed", pass:"sayed"}, {user:"omar", pass:"omar"}];

// Login
document.getElementById("loginBtn").addEventListener("click", async()=>{
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let found = admins.find(a=>a.user===username && a.pass===password);
    if(found){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");
        await loadTable();
    } else alert("Wrong login");
});

document.getElementById("logoutBtn").addEventListener("click",()=>location.reload());

// Save student
document.getElementById("saveBtn").addEventListener("click", async()=>{
    const student = {
        code: document.getElementById("code").value.trim(),
        name: document.getElementById("name").value.trim(),
        section: document.getElementById("section").value,
        studentphone: document.getElementById("studentphone").value.trim(),
        parentphone: document.getElementById("parentphone").value.trim(),
        homework: document.getElementById("homework").value,
        attendance: document.getElementById("attendance").value,
        quiz: document.getElementById("quiz").value
    };
    if(Object.values(student).some(v=>v==="")) return alert("Fill all fields");

    const {error} = await supabase.from("students").insert([student]);
    if(error) return alert("Failed to save: "+error.message);

    clearFields();
    await loadTable();
});

// Load table
async function loadTable(){
    let filter = document.getElementById("filterSection").value;
    let {data,error} = await supabase.from("students").select("*");
    if(error) return console.log(error);
    if(filter!=="All") data=data.filter(s=>s.section===filter);

    const table = document.getElementById("dataTable");
    table.innerHTML="";
    data.forEach(s=>{
        let row = table.insertRow();
        row.innerHTML = `
            <td>${s.code}</td>
            <td>${s.name}</td>
            <td>${s.section}</td>
            <td>${s.studentphone}</td>
            <td>${s.parentphone}</td>
            <td>${s.homework}</td>
            <td>${s.attendance}</td>
            <td>${s.quiz}</td>
            <td>
                <button class="whatsapp" onclick="sendWhatsApp('${s.parentphone}','${s.code}','${s.name}','${s.attendance}','${s.homework}','${s.quiz}')">WhatsApp</button>
                <button class="danger" onclick="deleteStudent(${s.id})">Delete</button>
            </td>
        `;
    });
}

// Delete
async function deleteStudent(id){
    const {error} = await supabase.from("students").delete().eq("id", id);
    if(error) return alert("Delete failed: "+error.message);
    await loadTable();
}

// Clear form
function clearFields(){
    document.getElementById("code").value="";
    document.getElementById("name").value="";
    document.getElementById("section").value="";
    document.getElementById("studentphone").value="";
    document.getElementById("parentphone").value="";
    document.getElementById("homework").value="";
    document.getElementById("attendance").value="";
    document.getElementById("quiz").value="";
}

// WhatsApp
function sendWhatsApp(phone, code, name, attendance, homework, quiz){
    if(!phone) return alert("Phone empty!");
    let cleanPhone = phone.replace(/\D/g,'');
    if(cleanPhone.length===10 && cleanPhone.startsWith("0")) cleanPhone="20"+cleanPhone.substring(1);
    else if(cleanPhone.length===9) cleanPhone="20"+cleanPhone;
    if(cleanPhone.length<11) return alert("Invalid phone");
    let message = `كود الطالب: ${code}\nاسم الطالب: ${name}\nالحضور: ${attendance}\nالواجب: ${homework}\nالدرجة: ${quiz}`;
    window.open("https://wa.me/"+cleanPhone+"?text="+encodeURIComponent(message), "_blank");
}

// Download CSV
document.getElementById("downloadBtn").addEventListener("click", async ()=>{
    let {data,error}=await supabase.from("students").select("*");
    if(error) return console.log(error);
    let filter=document.getElementById("filterSection").value;
    if(filter!=="All") data=data.filter(s=>s.section===filter);

    let csv="Code,Name,Section,Student Phone,Parent Phone,Homework,Attendance,Quiz\n";
    data.forEach(s=>{
        csv+=`${s.code},${s.name},${s.section},${s.studentphone},${s.parentphone},${s.homework},${s.attendance},${s.quiz}\n`;
    });
    let blob=new Blob([csv],{type:"text/csv"});
    let link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="students.csv";
    link.click();
});

// Filter
document.getElementById("filterSection").addEventListener("change", loadTable);
</script>
</body>
</html>
