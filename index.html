<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: linear-gradient(135deg,#4e73df,#1cc88a); margin:0; }
        .card { background:white; width:95%; max-width:1200px; margin:30px auto; padding:20px; border-radius:10px; }
        input, select { padding:8px; margin:5px; width:180px; }
        button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }
        .primary{background:#4e73df;color:white;}
        .success{background:#1cc88a;color:white;}
        .danger{background:#e74a3b;color:white;}
        .whatsapp{background:#25D366;color:white;}
        .hidden{display:none;}
        table{width:100%;margin-top:20px;border-collapse:collapse;}
        th,td{border:1px solid #ddd;padding:8px;text-align:center;}
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="card">
    <h2>Admin Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <br><br>
    <button class="primary" onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainPage" class="card hidden">
    <h2>Student System</h2>

    <input id="code" placeholder="Code">
    <input id="name" placeholder="Name">

    <select id="section">
        <option value="">Section</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <input id="studentPhone" placeholder="Student Phone">
    <input id="parentPhone" placeholder="Parent Phone">

    <select id="homework">
        <option value="">Homework</option>
        <option>Done</option>
        <option>Not Done</option>
    </select>

    <select id="attendance">
        <option value="">Attendance</option>
        <option>Present</option>
        <option>Absent</option>
    </select>

    <input id="quiz" type="number" placeholder="Quiz">

    <br><br>
    <button class="primary" onclick="saveStudent()">Save</button>
    <button class="success" onclick="generatePDF()">Generate PDF</button>
    <button class="danger" onclick="logout()">Logout</button>

    <br><br>
    <select id="filterSection" onchange="loadTable()">
        <option value="All">All</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>Code</th><th>Name</th><th>Section</th>
                <th>Student Phone</th><th>Parent Phone</th>
                <th>Homework</th><th>Attendance</th><th>Quiz</th><th>Actions</th>
            </tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>
</div>

<!-- SUPABASE + JSPDF -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const client = window.supabase.createClient(
    "https://uhshlpukhgreezddochz.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoc2hscHVraGdyZWV6ZGRvY2h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzI3MjYsImV4cCI6MjA5MDEwODcyNn0.JPY4_PBPsU-VdyJXgL2FgomTVbFjln3rz_wUnfRdCjA"
);

// Admin credentials
const admins = [
  {user:"sayed",pass:"sayed"},
  {user:"omar",pass:"omar"}
];

function login(){
    let u=document.getElementById("username").value;
    let p=document.getElementById("password").value;
    let ok=admins.find(a=>a.user===u && a.pass===p);
    if(ok){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");
        loadTable();
    } else alert("Wrong login");
}

function logout(){ location.reload(); }

// Save student
async function saveStudent(){
    let code=document.getElementById("code").value.trim();
    let name=document.getElementById("name").value.trim();
    let section=document.getElementById("section").value;
    let studentPhone=document.getElementById("studentPhone").value.trim();
    let parentPhone=document.getElementById("parentPhone").value.trim();
    let homework=document.getElementById("homework").value;
    let attendance=document.getElementById("attendance").value;
    let quiz=document.getElementById("quiz").value;

    if(!code||!name||!section||!studentPhone||!parentPhone||!homework||!attendance||quiz===""){
        alert("Fill all fields"); return;
    }

    // Auto convert parent phone to 20 format
    if(parentPhone.startsWith("0")) parentPhone="20"+parentPhone.substring(1);

    let { error } = await client.from("students").insert([{
        code,name,section,
        studentphone:studentPhone,
        parentphone:parentPhone,
        homework,attendance,quiz
    }]);

    if(error){ alert(error.message); return; }

    clearFields();
    loadTable();
    alert("Saved ✅");
}

// Load students table
async function loadTable(){
    let filter=document.getElementById("filterSection").value;
    let { data } = await client.from("students").select("*");

    let table=document.getElementById("dataTable");
    table.innerHTML="";

    data.forEach(s=>{
        if(filter!=="All" && s.section!==filter) return;

        let row=table.insertRow();
        row.innerHTML=`
        <td>${s.code}</td>
        <td>${s.name}</td>
        <td>${s.section}</td>
        <td>${s.studentphone}</td>
        <td>${s.parentphone}</td>
        <td>${s.homework}</td>
        <td>${s.attendance}</td>
        <td>${s.quiz}</td>
        <td>
        <button class="whatsapp" onclick="sendWhatsApp('${s.parentphone}','${s.code}','${s.name}','${s.attendance}','${s.homework}','${s.quiz}')">WhatsApp</button>
        <button onclick="deleteStudent(${s.id})" class="danger">Delete</button>
        </td>`;
    });
}

// WhatsApp
function sendWhatsApp(parentPhone, code, name, attendance, homework, quiz){
    if(!parentPhone){ alert("Parent number empty"); return; }
    let phone = parentPhone.replace(/\D/g,'');
    if(!phone.startsWith("20")) phone="20"+phone;
    let attendanceArabic = attendance==="Present"?"حاضر":"غائب";
    let homeworkArabic = homework==="Done"?"تم":"لم يتم";
    let message = `كود الطالب: ${code}\nاسم الطالب: ${name}\nالحضور: ${attendanceArabic}\nالواجب: ${homeworkArabic}\nالدرجة: ${quiz}`;
    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(message),"_blank");
}

// Delete student
async function deleteStudent(id){
    await client.from("students").delete().eq("id",id);
    loadTable();
}

// Clear
function clearFields(){
    document.querySelectorAll("input,select").forEach(e=>e.value="");
}

// Generate PDF with table borders
async function generatePDF(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF({orientation:"landscape"});
    let filter=document.getElementById("filterSection").value;
    let { data } = await client.from("students").select("*");
    let filtered = data.filter(s=>filter==="All"||s.section===filter);
    if(filtered.length===0){ alert("No data"); return; }

    doc.setFontSize(16);
    doc.text("Student Report", 140, 10);

    let startY=20, rowHeight=10, colWidths=[20,40,30,35,35,25,25,20];
    let headers=["Code","Name","Section","Student Phone","Parent Phone","Homework","Attendance","Quiz"];

    // Draw table header
    let x=10;
    doc.setFontSize(12);
    headers.forEach((h,i)=>{
        doc.rect(x, startY, colWidths[i], rowHeight);
        doc.text(h, x+2, startY+7);
        x+=colWidths[i];
    });

    // Draw table rows
    let y=startY+rowHeight;
    filtered.forEach(s=>{
        x=10;
        [s.code,s.name,s.section,s.studentphone,s.parentphone,s.homework,s.attendance,s.quiz].forEach((val,i)=>{
            doc.rect(x, y, colWidths[i], rowHeight);
            doc.text(val.toString(), x+2, y+7);
            x+=colWidths[i];
        });
        y+=rowHeight;
        if(y>180){ doc.addPage(); y=20; }
    });

    doc.save("students.pdf");
}
</script>

</body>
</html>
