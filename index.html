<!DOCTYPE html>
<html>
<head>
    <title>Student Management & Video System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: linear-gradient(135deg,#4e73df,#1cc88a); margin:0; padding:0;}
        .card { background:white; width:95%; max-width:1200px; margin:30px auto; padding:20px; border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,0.2);}
        input, select { padding:8px; margin:5px; border-radius:5px; border:1px solid #ccc; width:180px;}
        button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;}
        .primary { background:#4e73df; color:white;}
        .success { background:#1cc88a; color:white;}
        .danger { background:#e74a3b; color:white;}
        .whatsapp { background:#25D366; color:white;}
        button:hover { opacity:0.85;}
        table { width:100%; margin-top:20px; border-collapse:collapse;}
        th, td { padding:8px; border-bottom:1px solid #ddd; text-align:center;}
        th { background:#f2f2f2;}
        .hidden { display:none;}
        @media(max-width:768px){ input, select { width:100%; display:block;} }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="card">
    <h2>Login</h2>
    <button class="primary" onclick="showAdminLogin()">Admin</button>
    <button class="success" onclick="showStudentPage()">Student</button>

    <div id="adminLoginBox" class="hidden">
        <br>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <br><br>
        <button class="primary" onclick="login()">Login</button>
    </div>
</div>

<!-- ADMIN PAGE -->
<div id="adminPage" class="card hidden">
    <h2>Admin Panel</h2>

    <button class="danger" onclick="logout()">Logout</button>
    <hr>

    <h3>Add / Edit Student</h3>

    <input type="text" id="code" placeholder="Code">
    <input type="text" id="name" placeholder="Student Name">

    <select id="section">
        <option value="">Select Section</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <input type="tel" id="studentPhone" placeholder="Student Phone">
    <input type="tel" id="parentPhone" placeholder="Parent Phone">

    <select id="homework">
        <option value="">Homework</option>
        <option>Done</option>
        <option>Not Done</option>
    </select>

    <select id="attendance">
        <option value="">Attendance</option>
        <option>Present</option>
        <option>Absent</option>
    </select>

    <input type="number" id="quiz" placeholder="Quiz Degree">

    <br><br>
    <button class="primary" onclick="saveStudent()">Save Student</button>

    <table>
        <thead>
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Section</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>

    <hr>
    <h3>Video Lessons Management</h3>

    <input type="text" id="videoTitle" placeholder="Video Title">
    <input type="text" id="videoSection" placeholder="Section">
    <input type="text" id="allowedCode" placeholder="Allowed Student Code">
    <input type="file" id="videoFile" accept="video/*">

    <button class="success" onclick="uploadVideo()">Upload Video</button>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Section</th>
                <th>Code</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="videoTable"></tbody>
    </table>
</div>

<!-- STUDENT PAGE -->
<div id="studentPage" class="card hidden">
    <h2>Student Video Dashboard</h2>

    <input type="text" id="studentCodeLogin" placeholder="Enter Your Code">
    <button class="primary" onclick="studentLogin()">Enter</button>
    <button class="danger" onclick="logout()">Logout</button>

    <div id="studentVideos"></div>
</div>

<script>
const admins = [
    { user: "sayed", pass: "sayed" },
    { user: "omar", pass: "omar" }
];

const MASTER_KEY = "students_master_storage";
const VIDEO_KEY = "videos_master_storage";

let students = JSON.parse(localStorage.getItem(MASTER_KEY)) || [];
let videos = JSON.parse(localStorage.getItem(VIDEO_KEY)) || [];
let editIndex = -1;

/* ================= LOGIN ================= */

function showAdminLogin(){
    document.getElementById("adminLoginBox").classList.remove("hidden");
}

function showStudentPage(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("studentPage").classList.remove("hidden");
}

function login(){
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    let found = admins.find(a => a.user === username && a.pass === password);

    if(found){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("adminPage").classList.remove("hidden");
        loadTable();
        loadVideos();
    } else {
        alert("Wrong credentials");
    }
}

function logout(){
    location.reload();
}

/* ================= STUDENTS ================= */

function saveStudent(){
    let student = {
        code: code.value.trim(),
        name: name.value.trim(),
        section: section.value,
        studentPhone: studentPhone.value.trim(),
        parentPhone: parentPhone.value.trim(),
        homework: homework.value,
        attendance: attendance.value,
        quiz: quiz.value
    };

    if(!student.code || !student.name){
        alert("Fill required fields");
        return;
    }

    if(editIndex === -1) students.push(student);
    else { students[editIndex] = student; editIndex = -1; }

    localStorage.setItem(MASTER_KEY, JSON.stringify(students));
    clearFields();
    loadTable();
}

function loadTable(){
    let table = document.getElementById("dataTable");
    table.innerHTML = "";

    students.forEach((s,i)=>{
        let row = table.insertRow();
        row.innerHTML = `
            <td>${s.code}</td>
            <td>${s.name}</td>
            <td>${s.section}</td>
            <td>
                <button class="primary" onclick="editStudent(${i})">Edit</button>
                <button class="danger" onclick="deleteStudent(${i})">Delete</button>
            </td>
        `;
    });
}

function editStudent(i){
    let s = students[i];
    code.value = s.code;
    name.value = s.name;
    section.value = s.section;
    studentPhone.value = s.studentPhone;
    parentPhone.value = s.parentPhone;
    homework.value = s.homework;
    attendance.value = s.attendance;
    quiz.value = s.quiz;
    editIndex = i;
}

function deleteStudent(i){
    students.splice(i,1);
    localStorage.setItem(MASTER_KEY, JSON.stringify(students));
    loadTable();
}

function clearFields(){
    document.querySelectorAll("#adminPage input").forEach(i=>i.value="");
}

/* ================= VIDEOS ================= */

function uploadVideo(){
    let title = videoTitle.value.trim();
    let section = videoSection.value.trim();
    let code = allowedCode.value.trim();
    let file = videoFile.files[0];

    if(!title || !section || !code || !file){
        alert("Fill all video fields");
        return;
    }

    let reader = new FileReader();
    reader.onload = function(e){
        videos.push({
            title,
            section,
            code,
            data: e.target.result
        });

        localStorage.setItem(VIDEO_KEY, JSON.stringify(videos));
        loadVideos();
    };
    reader.readAsDataURL(file);
}

function loadVideos(){
    let table = document.getElementById("videoTable");
    table.innerHTML = "";

    videos.forEach((v,i)=>{
        let row = table.insertRow();
        row.innerHTML = `
            <td>${v.title}</td>
            <td>${v.section}</td>
            <td>${v.code}</td>
            <td>
                <button class="danger" onclick="deleteVideo(${i})">Delete</button>
            </td>
        `;
    });
}

function deleteVideo(i){
    videos.splice(i,1);
    localStorage.setItem(VIDEO_KEY, JSON.stringify(videos));
    loadVideos();
}

/* ================= STUDENT DASHBOARD ================= */

function studentLogin(){
    let codeInput = studentCodeLogin.value.trim();
    let container = document.getElementById("studentVideos");
    container.innerHTML = "";

    let allowed = videos.filter(v => v.code === codeInput);

    if(allowed.length === 0){
        container.innerHTML = "<p>No videos available.</p>";
        return;
    }

    allowed.forEach(v=>{
        container.innerHTML += `
            <h3>${v.title}</h3>
            <video width="100%" controls>
                <source src="${v.data}" type="video/mp4">
            </video>
            <hr>
        `;
    });
}
</script>

</body>
</html>
