<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#4e73df,#1cc88a);
}

.card {
  background:white;
  max-width:1000px;
  margin:30px auto;
  padding:20px;
  border-radius:10px;
}

input, select {
  padding:8px;
  margin:5px;
  width:180px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.primary { background:#4e73df; color:white; }
.danger { background:#e74a3b; color:white; }

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  "https://uhshlpukhgreezddochz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoc2hscHVraGdyZWV6ZGRvY2h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzI3MjYsImV4cCI6MjA5MDEwODcyNn0.JPY4_PBPsU-VdyJXgL2FgomTVbFjln3rz_wUnfRdCjA"
);
</script>

<div class="card">
<h2>Student System</h2>

<input id="code" placeholder="Code">
<input id="name" placeholder="Name">

<select id="section">
<option value="">Section</option>
<option>3rd Prep</option>
<option>Sec 1</option>
<option>Sec 2</option>
<option>Sec 3</option>
</select>

<input id="studentphone" placeholder="Student Phone">
<input id="parentphone" placeholder="Parent Phone">

<select id="homework">
<option value="">Homework</option>
<option>Done</option>
<option>Not Done</option>
</select>

<select id="attendance">
<option value="">Attendance</option>
<option>Present</option>
<option>Absent</option>
</select>

<input id="quiz" type="number" placeholder="Quiz">

<br><br>
<button class="primary" onclick="saveStudent()">Save Student</button>

<table>
<thead>
<tr>
<th>Code</th>
<th>Name</th>
<th>Section</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>
</div>

<script>
let editId=null;

// SAVE
async function saveStudent(){
  const code = document.getElementById("code").value;
  const name = document.getElementById("name").value;
  const section = document.getElementById("section").value;

  if(!code || !name || !section){
    alert("Fill required fields");
    return;
  }

  if(editId){
    await supabase.from("students")
    .update({code,name,section})
    .eq("id",editId);
    editId=null;
  } else {
    const {error} = await supabase.from("students")
    .insert([{code,name,section}]);

    if(error){
      console.error(error);
      alert("ERROR: "+error.message);
      return;
    }
  }

  loadTable();
}

// LOAD
async function loadTable(){
  const {data} = await supabase.from("students").select("*");

  const table = document.getElementById("dataTable");
  table.innerHTML="";

  data.forEach(s=>{
    table.innerHTML += `
    <tr>
      <td>${s.code}</td>
      <td>${s.name}</td>
      <td>${s.section}</td>
      <td>
        <button onclick="edit('${s.id}')">Edit</button>
        <button class="danger" onclick="del('${s.id}')">Delete</button>
      </td>
    </tr>`;
  });
}

// DELETE
async function del(id){
  await supabase.from("students").delete().eq("id",id);
  loadTable();
}

// EDIT
async function edit(id){
  const {data} = await supabase.from("students")
  .select("*").eq("id",id).single();

  editId=id;

  document.getElementById("code").value=data.code;
  document.getElementById("name").value=data.name;
  document.getElementById("section").value=data.section;
}

// LOAD ON START
loadTable();
</script>

</body>
</html>
