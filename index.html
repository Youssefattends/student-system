<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <style>
        body { font-family: Arial; text-align: center; background:#f2f2f2; }
        input, button, select { padding:8px; margin:5px; }
        table { margin:auto; margin-top:20px; border-collapse:collapse; width:95%; background:white; }
        th, td { border:1px solid black; padding:8px; }
        th { background:#ddd; }
        .hidden { display:none; }
    </style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
</div>

<!-- Main Page -->
<div id="mainPage" class="hidden">
    <h2>Student Attendance & Quiz System</h2>

    <input type="text" id="name" placeholder="Student Name">

    <select id="section">
        <option value="">Select Section</option>
        <option>3rd Prep</option>
        <option>Sec 1</option>
        <option>Sec 2</option>
        <option>Sec 3</option>
    </select>

    <input type="tel" id="studentPhone" placeholder="Student Phone Number">
    <input type="tel" id="parentPhone" placeholder="Parent Phone Number">

    <select id="homework">
        <option value="">Homework</option>
        <option>Done</option>
        <option>Not Done</option>
    </select>

    <select id="attendance">
        <option value="">Attendance</option>
        <option>Present</option>
        <option>Absent</option>
    </select>

    <input type="number" id="quiz" placeholder="Quiz Degree">

    <br>
    <button onclick="saveStudent()">Save Student</button>
    <button onclick="downloadExcel()">Download Excel</button>
    <button onclick="logout()">Logout</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Section</th>
                <th>Student Phone</th>
                <th>Parent Phone</th>
                <th>Homework</th>
                <th>Attendance</th>
                <th>Quiz</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = -1;

// Admin login credentials
const adminUser = "admin";
const adminPass = "654321";

function login() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;
    if(u === adminUser && p === adminPass){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");
        loadTable();
    } else { 
        alert("Wrong login"); 
    }
}

function logout() {
    location.reload();
}

function saveStudent() {
    let name = document.getElementById("name").value;
    let section = document.getElementById("section").value;
    let studentPhone = document.getElementById("studentPhone").value;
    let parentPhone = document.getElementById("parentPhone").value;
    let homework = document.getElementById("homework").value;
    let attendance = document.getElementById("attendance").value;
    let quiz = document.getElementById("quiz").value;

    if(!name || !section || !studentPhone || !parentPhone || !homework || !attendance || !quiz){
        alert("Fill all fields"); 
        return;
    }

    let student = { name, section, studentPhone, parentPhone, homework, attendance, quiz };

    if(editIndex === -1) {
        students.push(student);
    } else {
        students[editIndex] = student;
        editIndex = -1;
    }

    localStorage.setItem("students", JSON.stringify(students));
    clearFields();
    loadTable();
}

function loadTable() {
    let table = document.getElementById("dataTable");
    table.innerHTML = "";

    students.forEach((s, i)=>{
        let row = table.insertRow();
        row.insertCell(0).innerHTML = s.name;
        row.insertCell(1).innerHTML = s.section;
        row.insertCell(2).innerHTML = s.studentPhone;
        row.insertCell(3).innerHTML = s.parentPhone;
        row.insertCell(4).innerHTML = s.homework;
        row.insertCell(5).innerHTML = s.attendance;
        row.insertCell(6).innerHTML = s.quiz;
        row.insertCell(7).innerHTML = `
            <button onclick="editStudent(${i})">Edit</button>
            <button onclick="deleteStudent(${i})">Delete</button>
        `;
    });
}

function editStudent(i) {
    let s = students[i];
    document.getElementById("name").value = s.name;
    document.getElementById("section").value = s.section;
    document.getElementById("studentPhone").value = s.studentPhone;
    document.getElementById("parentPhone").value = s.parentPhone;
    document.getElementById("homework").value = s.homework;
    document.getElementById("attendance").value = s.attendance;
    document.getElementById("quiz").value = s.quiz;
    editIndex = i;
}

function deleteStudent(i) {
    students.splice(i,1);
    localStorage.setItem("students", JSON.stringify(students));
    loadTable();
}

function clearFields() {
    document.getElementById("name").value="";
    document.getElementById("section").value="";
    document.getElementById("studentPhone").value="";
    document.getElementById("parentPhone").value="";
    document.getElementById("homework").value="";
    document.getElementById("attendance").value="";
    document.getElementById("quiz").value="";
}

function downloadExcel() {
    let csv = "Name,Section,Student Phone,Parent Phone,Homework,Attendance,Quiz\n";
    
    students.forEach(s => {
        csv += `${s.name},${s.section},${s.studentPhone},${s.parentPhone},${s.homework},${s.attendance},${s.quiz}\n`;
    });

    let blob = new Blob([csv], { type:"text/csv" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "students.csv";
    link.click();
}
</script>

</body>
</html>
